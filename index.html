
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>ReminderPush v0.3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>ReminderPush</h1>
    </header>
    <main>
        <section id="form">
            <h2>Crea o Modifica un Promemoria</h2>
            <input type="text" id="title" placeholder="Titolo">
            <textarea id="description" placeholder="Descrizione"></textarea>
            <input type="datetime-local" id="deadline">
            <textarea id="recipient" placeholder="Inserisci numeri WhatsApp ed email separati da virgole"></textarea>
            <button onclick="sendReminder()">Invia / Salva</button>
        </section>
        <section id="filters">
            <button onclick="setFilter('all')">Tutti</button>
            <button onclick="setFilter('pending')">In sospeso</button>
            <button onclick="setFilter('done')">Completati</button>
        </section>
        <section id="history">
            <h2>Cronologia</h2>
            <ul id="reminderList"></ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
